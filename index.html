<!doctype html>

<!--
  To change the theme, change the class on the html tag below to one of:
  - theme-auto: Automatically switches based on user's system preferences
  - theme-light: Forces light theme
  - theme-dark: Forces dark theme
-->

<html class="theme-auto" lang="en">
  <!-- Update`class="theme-auto" with your preference -->

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Page Title - Change this to your name/brand (50-60 characters recommended) -->
    <title>Where Is Nicey?!</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png" />
    <!-- Update this with your own favicon -->

    <!-- Meta Description - Write a description (150-160 characters recommended) -->
    <meta name="description" content="Find niceygy here!" />

    <!-- Keywords -->
    <meta name="keywords" content="Made with 💥 & 🩷, by Niceygy" />

    <!-- Canonical URL - Helps prevent duplicate content issues -->
    <meta rel="canonical" href="https://niceygy.net" />

    <!-- Author Information -->
    <meta name="author" content="Niceygy (Ava Whale)" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/brands.css" />

    <!-- LittleLink Extended Stylesheet (Optional) -->
    <!-- <link rel="stylesheet" href="css/brands-extended.css"> -->
    <!-- Learn more at https://github.com/sethcottle/littlelink-extended.
         Remove comments if you've added LittleLink Extended dependencies -->
  </head>

  <body>
    <div class="container">
      <div class="column">
        <!--
              By default, the Avatar is rounded. Use the following:
              - avatar--rounded: Automatically rounds the image
              - avatar--soft: Slightly rounds the image
              - avatar--none: Removes any rounding

              Be sure to replace the src with your own image path and update the alt text
            -->
        <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar.png 2x" alt="My Logo" />

        <!-- Replace with your name or brand -->
        <h1>
          <div>Where Is Nicey?!</div>
        </h1>

        <!-- Add a short description about yourself or your brand -->
        <p>All of my links are here! (If it's not here, it's not me)</p>

        <!-- All your buttons go here -->
        <div class="button-stack" role="navigation">
          <!-- Bluesky -->
          <a class="button button-bluesky" href="https://go.niceygy.net/bksy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/bluesky.svg" alt="Bluesky Logo" />Bluesky</a
          >

          <!-- GitHub -->
          <a class="button button-github" href="https://github.com/niceygy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo" />GitHub</a
          >
          <!-- Ko-fi -->
          <a class="button button-ko-fi" href="https://go.niceygy.net/ko-fi" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/ko-fi.svg" alt="Ko-fi Logo" />Support me on Ko-fi</a
          >

          <!-- FD Forums -->
          <a class="button button-default" href="https://forums.frontier.co.uk/members/niceygy.303417/" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/generic-blog.svg" alt="Generic Icon" />Frontier Forums</a
          >

          <!-- Mastodon -->
          <a class="button button-mastodon" href="https://cmdr.social/@niceygy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/mastodon.svg" alt="Mastodon Logo" />Mastodon</a
          >

          <!-- Reddit -->
          <a class="button button-reddit" href="reddit.com/u/niceygy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/reddit.svg" alt="Reddit Logo" />Reddit</a
          >
          <!-- Twitch -->
          <a class="button button-twitch" href="https://www.twitch.tv/niceygy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/twitch.svg" alt="Twitch Logo" />Twitch</a
          >
          <!-- YouTube -->
          <a class="button button-yt" href="https://youtube.com/@CMDR_Niceygy" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo" />YouTube</a
          >

          <!-- Generic Blog -->
          <a class="button button-default" href="https://niceygy.net" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/generic-blog.svg" alt="Blog Icon" />I have a website!</a
          >
          <!-- Generic Email -->
          <a class="button button-default" href="https://go.niceygy.net/mailme" target="_blank" rel="noopener" role="button"
            ><img class="icon" aria-hidden="true" src="images/icons/generic-email.svg" alt="Email Icon" />Email Me (if you need to)</a
          >
        </div>

        <!-- Feel free to add your own footer information, including updating `privacy.html` to reflect how your LittleLink fork is set up -->
        <footer>Made with <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>. This page does not use cookies!</footer>
      </div>
    </div>
  </body>
</html>
